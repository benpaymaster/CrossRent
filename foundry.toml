[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
auto_detect_solc = true # Let it detect 0.8.34 from your files
optimizer = true
optimizer_runs = 10000 # Optimized for high-frequency rental transactions
via_ir = true
evm_version = "cancun" 
ignored_error_codes = [2424]

remappings = [
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz" # Placeholders for your pilot
arc = "https://api.arc.net/testnet"

[etherscan]
monad_testnet = { key = "${MONAD_API_KEY}", url = "https://explorer.monad.xyz/api" }